# ClaimeAI Pipeline Configuration
#
# Non-sensitive settings for the fact-checking pipeline.
# API keys stay in .env — this file is for configuration
# choices that are safe to commit.
#
# Environment variables override values here (e.g.,
# LLM_PROVIDER=openrouter overrides pipeline.llm_provider).

[pipeline]
llm_provider = "openai"         # "openai" or "openrouter"
search_provider = "exa"         # "exa" or "tavily"
results_per_query = 3           # search results per query
max_search_iterations = 5       # max search rounds per claim
summarize_evidence = true       # condense raw evidence at "mid" tier before
                                 # high-tier evaluation (TG 03.4); false =
                                 # evaluate_evidence reads raw evidence (pre-TG-03.4 behavior)
vault_match_fallback = true     # citation-free vault matching: after the argument_pyramid-
                                 # filtered pass, run ONE extra mid-tier batch call against the
                                 # full vault (evidence-type filtered only) for still-unmatched
                                 # claims, catching notes missing the argument_pyramid tag.
                                 # false = current single-pass (filtered-corpus-only) behavior

[models.openai]
low = "openai:gpt-4o-mini"
mid = "openai:gpt-4.1-mini"
high = "openai:gpt-4.1"

[models.openrouter]
low = "google/gemma-4-26b-a4b-it"
mid = "anthropic/claude-haiku-4.5"
high = "anthropic/claude-sonnet-5"

# Reasoning effort for hybrid-reasoning models.
# Only specify tiers that need it — missing tiers default to no reasoning.
[reasoning.openrouter]
high = "medium"
